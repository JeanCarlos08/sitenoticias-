name: Generate Daily News

on:
  schedule:
    - cron: '0 8 * * *' # Todo dia às 08:00 UTC
  workflow_dispatch: # Permite rodar manualmente para teste

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run news generator
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
        run: |
          cd scripts
          python generator.py

      - name: Commit and push changes
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add src/data/news.json
          git commit -m "chore: update daily news [skip ci]" || echo "No changes to commit"
          git push   