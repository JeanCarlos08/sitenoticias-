name: Generate 24h News — HORIZON INTEL ULTRA

on:
  schedule:
    # Roda a cada 3 horas = 8x por dia (0h, 3h, 6h, 9h, 12h, 15h, 18h, 21h UTC)
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
  workflow_dispatch: # Permite rodar manualmente para teste

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30   # Aumentado — Llama3-70b gera relatórios mais longos
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run news generator (ULTRA Sweep — 35+ RSS, Llama3-70b)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          cd scripts
          python generator.py

      - name: Commit and push changes
        run: |
          git config --global user.name "Horizon Intel Bot"
          git config --global user.email "bot@horizonintel.ai"
          git add src/data/news.json
          git commit -m "chore: ULTRA sweep — $(date -u +'%Y-%m-%d %H:%M UTC') [auto]" || echo "No changes to commit"
          git push