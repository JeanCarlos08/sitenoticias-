name: Generate 24h News — HORIZON INTEL

on:
  schedule:
    - cron: '0 6,12,18,0 * * *'  # Atualiza 4x por dia (6h, 12h, 18h, 00h UTC)
  workflow_dispatch: # Permite rodar manualmente para teste

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run news generator (Mega Sweep)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          cd scripts
          python generator.py

      - name: Commit and push changes
        run: |
          git config --global user.name "Horizon Intel Bot"
          git config --global user.email "bot@horizonintel.ai"
          git add src/data/news.json
          git commit -m "chore: 24h sweep — $(date -u +'%Y-%m-%d %H:%M UTC') [skip ci]" || echo "No changes to commit"
          git push