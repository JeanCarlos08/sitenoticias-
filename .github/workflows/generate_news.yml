name: Generate News — HORIZON INTEL

on:
  schedule:
    # Roda a cada 3 horas = 8x por dia (0h, 3h, 6h, 9h, 12h, 15h, 18h, 21h UTC)
    - cron: '0 0,3,6,9,12,15,18,21 * * *'
  workflow_dispatch: # Permite rodar manualmente para teste

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 20   # 15 artigos × ~45s/artigo ≈ 12 min. 20min é margem segura.
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Histórico completo para evitar conflitos de push

      - name: Validate required secrets
        run: |
          if [ -z "${{ secrets.GROQ_API_KEY }}" ]; then
            echo "❌ ERRO: Secret GROQ_API_KEY não está configurado no repositório."
            echo "Acesse Settings → Secrets → Actions e adicione a chave."
            exit 1
          fi
          echo "✅ GROQ_API_KEY detectado. Iniciando ciclo de geração..."

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install requests

      - name: Run news generator (15 artigos × Llama3-70b)
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          NEWS_API_KEY: ${{ secrets.NEWS_API_KEY }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          cd scripts
          python generator.py

      - name: Generate Sitemap (SEO Google News)
        run: |
          cd scripts
          python generate_sitemap.py

      - name: Commit and push changes
        run: |
          git config --global user.name "Horizon Intel Bot"
          git config --global user.email "bot@horizonintel.ai"
          git pull --rebase origin main || git pull --rebase origin master
          git add src/data/news.json public/sitemap.xml
          git commit -m "chore: sweep $(date -u +'%Y-%m-%d %H:%M UTC') — 15 novos relatórios + sitemap [auto]" || echo "Nenhuma alteração para commitar"
          git push